# Alertmanager Configuration - Demo Mode
# Alerts are visible in the UI but no external notifications are sent
# Perfect for testing, demos, and learning environments

global:
  resolve_timeout: 5m  # How long to wait before marking an alert as resolved

# Routing tree for alert distribution
route:
  # Group alerts by these labels to reduce notification spam
  group_by: ['alertname', 'severity', 'component']

  # How long to wait before sending initial notification
  group_wait: 10s

  # How long to wait before sending notification about new alerts in the same group
  group_interval: 10s

  # How long to wait before re-sending a notification
  repeat_interval: 12h

  # Default receiver for all alerts
  receiver: 'demo-receiver'

  # Child routes for different severity levels
  routes:
    # Critical alerts - shorter intervals for visibility
    - match:
        severity: critical
      receiver: 'demo-receiver'
      group_wait: 5s
      group_interval: 5s
      repeat_interval: 4h
      continue: false

    # Warning alerts - standard intervals
    - match:
        severity: warning
      receiver: 'demo-receiver'
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      continue: false

    # Info alerts - longer intervals
    - match:
        severity: info
      receiver: 'demo-receiver'
      group_wait: 30s
      group_interval: 30s
      repeat_interval: 24h
      continue: false

# Inhibition rules to suppress certain alerts when others are firing
inhibit_rules:
  # If PostgreSQL is down, inhibit all other postgres alerts
  - source_match:
      alertname: 'PostgreSQLDown'
    target_match_re:
      alertname: '.*'
    equal: ['instance']

  # If error budget burn is fast, inhibit slow burn alerts
  - source_match:
      burn_rate: 'fast'
    target_match:
      burn_rate: 'slow'
    equal: ['database']

# Receiver definitions
receivers:
  # Demo receiver - logs alerts but doesn't send notifications
  - name: 'demo-receiver'
